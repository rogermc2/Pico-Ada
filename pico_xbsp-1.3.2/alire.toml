name                            = "pico_xbsp"
description                     = "Extended board support package for Raspberry Pi Pico"
long-description                = """Extended board support package (XBSP) for the Raspberry Pi Pico.

This crate extends the official pico_bsp from Jeremy Grosser with additional,
reusable components. It is designed for general use in any Ada project targeting
the RP2040-based Raspberry Pi Pico and is not limited to the Pi Ada Tutorial.

It is developed in parallel with the Pi Ada Tutorial[](https://pi-ada-tutorial.sourceforge.io/)
and therefore also supplies the exact support packages used in the tutorial
chapters. This dual role makes pico_xbsp equally suitable for:

* Standalone embedded Ada projects that only need the extra functionality, and
* Readers following the tutorial who want ready-made, well-documented building
  blocks.

Current content:

1. Pico.Analog - Simplified analogue GPIO using Pulse Width Modulation (PWM).

All packages are supplied with complete GNATDOC annotations.

GNATdoc documentation:
https://pi-ada-tutorial.sourceforge.io/gnatdoc/

SourceForge repository:
https://sourceforge.net/projects/pi-ada-tutorial/

The crate will grow with each new tutorial chapter while remaining a clean,
independent library.
"""
version                         = "1.3.2"
licenses                        = "GPL-3.0-or-later"
authors                         = ["Martin Krischik <krischik@users.sourceforge.net>"]
maintainers                     = ["Martin Krischik <krischik@users.sourceforge.net>"]
maintainers-logins              = ["krischik"]
website                         = "https://pi-ada-tutorial.sourceforge.io/"
tags                            = ["raspberry", "pi", "pico", "rp2040", "tasking", "light-tasking", "ada2022", "embedded"]

[build-switches]
"*".ada_version                 = ["-gnat2022"]
development.compile_checks      = "Warnings"
development.contracts           = "Yes"
development.runtime_checks      = "Overflow"
release.compile_checks          = "Warnings"
release.contracts               = "No"
release.runtime_checks          = "Default"
validation.compile_checks       = "Warnings"
validation.contracts            = "Yes"
validation.runtime_checks       = "Everything"

[[depends-on]]
pico_bsp                        = "^2.2"

